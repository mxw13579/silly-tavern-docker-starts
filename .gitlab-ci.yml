stages:
  - lint
  - test

# For Docker/Kubernetes executors, `image:` applies.
# For shell executors, `image:` is ignored, so jobs must not assume Alpine or `apk`.
default:
  image: alpine:3.20

.lint:template:
  stage: lint
  variables:
    # bash_syntax | shellcheck
    LINT_KIND: ""
    # Only used for LINT_KIND=shellcheck. Override in CI/CD variables if needed.
    SHELLCHECK_OPTS: ""
  script:
    - |
      set -e

      case "${LINT_KIND}" in
        bash_syntax|shellcheck) ;;
        *)
          echo "ERROR: invalid LINT_KIND='${LINT_KIND}'. Expected 'bash_syntax' or 'shellcheck'."
          exit 1
          ;;
      esac

      # Install tools when running inside Alpine containers (Docker/Kubernetes executor).
      # On shell runners, `apk` is typically absent; do not call it unconditionally.
      if command -v apk >/dev/null 2>&1; then
        pkgs="bash"
        if [ "${LINT_KIND}" = "shellcheck" ]; then
          pkgs="${pkgs} shellcheck"
        fi
        apk add --no-cache ${pkgs}
      fi

      if ! command -v bash >/dev/null 2>&1; then
        echo "ERROR: bash is required but was not found in PATH."
        echo "Install bash on the runner host, or run this job on a Docker/Kubernetes runner."
        exit 1
      fi

      if [ "${LINT_KIND}" = "shellcheck" ] && ! command -v shellcheck >/dev/null 2>&1; then
        echo "ERROR: shellcheck is required but was not found in PATH."
        echo "Install shellcheck on the runner host, or run this job on a Docker/Kubernetes runner."
        exit 1
      fi
    - |
      bash -lc '
        set -euo pipefail

        shopt -s nullglob

        files=()

        for f in linux-*.sh; do
          [[ -f "${f}" ]] && files+=("${f}")
        done

        for f in \
          "sillytavern-toolkit/install.sh" \
          "st-toolkit.sh" \
          "sillytavern-toolkit/st-toolkit.sh"
        do
          [[ -f "${f}" ]] && files+=("${f}")
        done

        if [[ -d "sillytavern-toolkit/scripts" ]]; then
          # Recursively cover sillytavern-toolkit/scripts/**/*.sh (includes nested dirs like lib/, docker/, sillytavern/).
          if command -v find >/dev/null 2>&1; then
            while IFS= read -r f; do
              [[ -f "${f}" ]] && files+=("${f}")
            done < <(find sillytavern-toolkit/scripts -type f -name '*.sh' -print)
          else
            echo "ERROR: find is required to discover scripts under sillytavern-toolkit/scripts recursively."
            exit 1
          fi
        fi

        if (( ${#files[@]} == 0 )); then
          echo "No target scripts found; skipping."
          exit 0
        fi

        case "${LINT_KIND}" in
          bash_syntax)
            for f in "${files[@]}"; do
              echo "bash -n ${f}"
              bash -n "${f}"
            done
            ;;
          shellcheck)
            # Treat SHELLCHECK_OPTS as whitespace-separated options.
            read -r -a sc_opts <<< "${SHELLCHECK_OPTS:-}"
            for f in "${files[@]}"; do
              echo "shellcheck ${SHELLCHECK_OPTS} --shell=bash ${f}"
              shellcheck "${sc_opts[@]}" --shell=bash "${f}"
            done
            ;;
          *)
            echo "ERROR: unexpected LINT_KIND='${LINT_KIND}'."
            exit 1
            ;;
        esac
      '

lint:bash_syntax:
  extends: .lint:template
  variables:
    LINT_KIND: "bash_syntax"

lint:shellcheck:
  extends: .lint:template
  variables:
    LINT_KIND: "shellcheck"

test:bats:
  stage: test
  script:
    - |
      set -e

      # Docker/Kubernetes runners: install bats via apk (Alpine image).
      # Shell runners: do not assume apk exists; fail with a clear message when bats is missing.
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache bash coreutils findutils gawk grep sed
        if ! apk add --no-cache bats; then
          apk add --no-cache bats-core || true
        fi
      fi

      if ! command -v bash >/dev/null 2>&1; then
        echo "ERROR: bash is required but was not found in PATH."
        echo "Install bash on the runner host, or run this job on a Docker/Kubernetes runner."
        exit 1
      fi

      if ! command -v bats >/dev/null 2>&1; then
        echo "ERROR: bats is required but was not found in PATH."
        echo "Install bats on the runner host, or run this job on a Docker/Kubernetes runner."
        exit 1
      fi

    - |
      bash -lc '
        set -euo pipefail
        bats -r tests/bats
      '
