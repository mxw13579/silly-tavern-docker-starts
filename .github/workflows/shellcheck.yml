name: ShellCheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: bash -n and shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Collect shell scripts
        id: scripts
        shell: bash
        run: |
          mapfile -d '' scripts < <(
            {
              find . -maxdepth 1 -type f -name 'linux-*.sh' -print0
              find ./sillytavern-toolkit -type f -name '*.sh' -print0
            } | sort -z
          )

          if ((${#scripts[@]} == 0)); then
            echo "found=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          printf '%s\0' "${scripts[@]}" > shell-scripts.list
          echo "found=true" >> "${GITHUB_OUTPUT}"
          printf 'Found %d shell scripts:\n' "${#scripts[@]}"
          printf ' - %s\n' "${scripts[@]}"

      - name: Check Bash syntax
        if: steps.scripts.outputs.found == 'true'
        shell: bash
        run: |
          while IFS= read -r -d '' script; do
            bash -n "${script}"
          done < shell-scripts.list

      - name: Run ShellCheck
        if: steps.scripts.outputs.found == 'true'
        shell: bash
        run: |
          xargs -0 shellcheck -x -e SC1090 -e SC1091 < shell-scripts.list
